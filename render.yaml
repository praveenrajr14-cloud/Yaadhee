# Render.com deployment configuration for Yadhee Heritage
# Docs: https://render.com/docs/render-yaml-syntax

services:
  - type: web
    name: yadhee-heritage
    runtime: node
    region: singapore       # Closest to India
    plan: free              # Free tier

    # Build: install deps + compile sqlite3 native binary for Linux
    buildCommand: npm install && npm rebuild sqlite3 --build-from-source

    # Start: seed DB if missing, then launch server
    startCommand: node -e "const fs=require('fs'); if(!fs.existsSync('yadhee.db')){ require('./db_init'); }" && node server.js

    # Health check endpoint
    healthCheckPath: /

    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production

    # Auto-deploy on every push to main branch
    autoDeploy: true
